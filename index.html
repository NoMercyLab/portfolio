<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoMercyLab Official Site</title>
  <style>
    body, html {
      margin:0; padding:0; height:100%; width:100%;
      font-family: Arial, sans-serif; color:#fff; overflow:hidden;
    }
    /* Background video */
    #bg-video {
      position:fixed; right:0; bottom:0;
      min-width:100%; min-height:100%;
      object-fit:cover;
      z-index:-1;
    }
    /* Overlay content */
    .overlay {
      position:absolute; top:0; left:0;
      width:100%; height:100%;
      display:flex; justify-content:space-between; align-items:center;
      padding:20px;
    }
    .btn {
      background:rgba(0,0,0,0.6);
      border:2px solid #d4af37; /* gold border */
      color:#d4af37;
      padding:15px 25px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }
    .btn:hover { background:#d4af37; color:#000; }
    /* Info panels */
    .info-panel {
      position:absolute; top:50%; transform:translateY(-50%);
      width:300px; padding:20px;
      background:rgba(0,0,0,0.85);
      border:2px solid #d4af37;
      display:none;
      opacity:0;
      animation: fadeIn 0.5s forwards;
    }
    #left-panel { left:20px; }
    #right-panel { right:20px; }

    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(-50%) scale(0.95); }
      to { opacity:1; transform:translateY(-50%) scale(1); }
    }
  </style>
</head>
<body>
  <!-- Background video -->
  <video autoplay muted loop id="bg-video">
    <source src="videos/building-zoom.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>

  <!-- Overlay buttons -->
  <div class="overlay">
    <button class="btn" onclick="togglePanel('left')">More Info (Left)</button>
    <button class="btn" onclick="togglePanel('right')">More Info (Right)</button>
  </div>

  <!-- Info panels -->
  <div id="left-panel" class="info-panel">
    <h2>About the Building</h2>
    <p>This is an official government-style portfolio site with a premium dark theme.</p>
  </div>

  <div id="right-panel" class="info-panel">
    <h2>About NoMercyLab</h2>
    <p>Computer Science student, technology enthusiast, and creator of modern web projects.</p>
  </div>

  <script>
    function togglePanel(side) {
      const panel = document.getElementById(side+'-panel');
      if (panel.style.display === 'block') {
        panel.style.display = 'none';
      } else {
        panel.style.display = 'block';
        panel.style.animation = 'fadeIn 0.5s forwards';
      }
    }
  </script>
</body>
</html>
