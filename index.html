<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoMercyLab Official Site</title>
  <style>
    body, html {
      margin:0; padding:0; height:100%; width:100%;
      font-family: Arial, sans-serif; color:#fff; overflow:hidden;
    }
    /* Background image with zoom animation */
    #bg-image {
      position:fixed; right:0; bottom:0;
      min-width:100%; min-height:100%;
      object-fit:cover;
      z-index:-1;
      animation: zoomIn 10s ease forwards;
      transition: filter 0.5s ease;
    }
    @keyframes zoomIn {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    /* Overlay buttons */
    .overlay {
      position:absolute; top:0; left:0;
      width:100%; height:100%;
      display:flex; justify-content:space-evenly; align-items:center;
      padding:20px;
      z-index:2;
    }
    .btn {
      flex:0 0 180px;
      text-align:center;
      background:rgba(0,0,0,0.6);
      border:2px solid #d4af37;
      color:#d4af37;
      padding:15px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }
    .btn:hover { background:#d4af37; color:#000; }

    /* Dark overlay when panel open */
    #dark-overlay {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
      display:none;
      z-index:1;
    }

    /* Info panels */
    .info-panel {
      position:absolute; top:50%; transform:translateY(-50%);
      width:300px; padding:20px;
      background:rgba(0,0,0,0.85);
      border:2px solid #d4af37;
      display:none;
      opacity:0;
      z-index:3;
    }
    .info-panel h2 { margin-top:0; }
    .close-btn {
      float:right;
      background:none;
      border:none;
      color:#d4af37;
      font-size:20px;
      cursor:pointer;
    }
    #left-panel { left:-350px; }
    #right-panel { right:-350px; }

    /* Animations */
    @keyframes slideInLeft {
      from { left:-350px; opacity:0; }
      to { left:20px; opacity:1; }
    }
    @keyframes slideInRight {
      from { right:-350px; opacity:0; }
      to { right:20px; opacity:1; }
    }
    @keyframes slideOutLeft {
      from { left:20px; opacity:1; }
      to { left:-350px; opacity:0; }
    }
    @keyframes slideOutRight {
      from { right:20px; opacity:1; }
      to { right:-350px; opacity:0; }
    }
  </style>
</head>
<body>
  <!-- Background image -->
  <img src="images/building.jpg" id="bg-image" alt="Building Background">

  <!-- Dark overlay -->
  <div id="dark-overlay"></div>

  <!-- Overlay buttons -->
  <div class="overlay">
    <button class="btn" onclick="togglePanel('left')">Projects</button>
    <button class="btn" onclick="togglePanel('right')">More Info</button>
  </div>

  <!-- Info panels -->
  <div id="left-panel" class="info-panel">
    <button class="close-btn" onclick="togglePanel('left')">✖</button>
    <h2>Projects</h2>
    <ul>
      <li><strong>Calculator App</strong> – A simple calculator built with JavaScript.</li>
      <li><strong>Student Database</strong> – CRUD system for managing student records.</li>
    </ul>
  </div>

  <div id="right-panel" class="info-panel">
    <button class="close-btn" onclick="togglePanel('right')">✖</button>
    <h2>About NoMercyLab</h2>
    <p>Computer Science student, technology enthusiast, and creator of modern web projects.</p>
  </div>

  <script>
    function togglePanel(side) {
      const panel = document.getElementById(side+'-panel');
      const bg = document.getElementById('bg-image');
      const overlay = document.getElementById('dark-overlay');

      if (panel.style.display === 'block') {
        if (side === 'left') {
          panel.style.animation = 'slideOutLeft 0.5s forwards';
        } else {
          panel.style.animation = 'slideOutRight 0.5s forwards';
        }
        setTimeout(() => { 
          panel.style.display = 'none'; 
          bg.style.filter = 'blur(0px)';
          overlay.style.display = 'none';
        }, 500);
      } else {
        panel.style.display = 'block';
        if (side === 'left') {
          panel.style.animation = 'slideInLeft 0.5s forwards';
        } else {
          panel.style.animation = 'slideInRight 0.5s forwards';
        }
        bg.style.filter = 'blur(5px)';
        overlay.style.display = 'block';
      }
    }
  </script>
</body>
</html>
